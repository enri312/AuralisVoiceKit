name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run doctor
        run: python -m auralis_voicekit.cli doctor

      - name: Run stability gate
        run: python tools/stability_gate.py --min-stage pilot

  future-python:
    name: Experimental future Python
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.15-dev"
          allow-prereleases: true

      - name: Install package
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run doctor
        run: python -m auralis_voicekit.cli doctor

  compressed-audio:
    name: Compressed audio / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install ffmpeg on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install ffmpeg on Windows
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y --no-progress

      - name: Install ffmpeg on macOS
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install package
        run: python -m pip install -e .

      - name: Run compressed audio integration tests
        env:
          AURALIS_RUN_FFMPEG_INTEGRATION: "1"
        run: python -m unittest tests.test_ffmpeg_integration
